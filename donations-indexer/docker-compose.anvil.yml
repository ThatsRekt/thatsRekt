# =============================================================================
# Compose overlay — local anvil-eth testbed for the donations-indexer.
#
# Brings up:
#   - anvil-eth: local Ethereum fork (chainId 1, port 127.0.0.1:18545)
#   - donations-db: Postgres 16 for the donations database
#   - donations-indexer: the processor under test
#
# Usage:
#   docker compose -f docker-compose.anvil.yml up -d
#   # Fund the Safe from a test wallet:
#   cast send --rpc-url http://127.0.0.1:18545 \
#     --private-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80 \
#     --value 10000000000000000 \
#     0x59E4DBc95BD312A882Bb36b7f3E8298682340679
#   # Watch logs:
#   docker compose -f docker-compose.anvil.yml logs -f donations-indexer
#
# FINALITY_CONFIRMATION=0 treats all anvil blocks as final so the processor
# writes donations without waiting for 75-block confirmation depth.
# =============================================================================

services:
  anvil-eth:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: anvil
    command:
      - --host=0.0.0.0
      - --chain-id=1
      - --port=8545
      - --silent
    ports:
      - '127.0.0.1:18545:8545'
    healthcheck:
      test: ['CMD-SHELL', 'cast chain-id --rpc-url http://localhost:8545 | grep -q 1']
      interval: 5s
      timeout: 5s
      retries: 20

  donations-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: thatsrekt_donations
    ports:
      - '127.0.0.1:15432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 20

  donations-indexer:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      RPC_ETHEREUM_HTTP: http://anvil-eth:8545
      DONATIONS_DB_URL: postgres://postgres:postgres@donations-db:5432/thatsrekt_donations
      START_BLOCK_ETHEREUM: '0'
      FINALITY_CONFIRMATION: '0'
    depends_on:
      anvil-eth:
        condition: service_healthy
      donations-db:
        condition: service_healthy
    restart: on-failure
