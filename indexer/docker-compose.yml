      DB_PORT: 5432
      DB_NAME: thatsrekt_anvil_base
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
    restart: 'no'
    depends_on:
      db:
        condition: service_healthy

  processor-anvil-base:
    <<: *indexer
    command: ['node', 'lib/main.js']
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: thatsrekt_anvil_base
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      CHAIN: anvil-base
      RPC_ANVIL_BASE_HTTP: ${RPC_ANVIL_BASE_HTTP:-http://anvil-base:8545}
      CONTRACT_ANVIL_BASE: ${CONTRACT_ANVIL_BASE:-}
      START_BLOCK_ANVIL_BASE: ${START_BLOCK_ANVIL_BASE:-}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate-anvil-base:
        condition: service_completed_successfully

  graphql-anvil-base:
    <<: *indexer
    command: ['npx', 'squid-graphql-server']
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: thatsrekt_anvil_base
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
