<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- SVG favicon for modern browsers (sharp at any DPI, 0 bytes in the
         PNG asset path). PNG fallback kept for older browsers + Apple
         Touch Icon. OG/Twitter meta below still references logo.png
         (raster required for social crawlers). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />

    <!--
      Browser-tab + search-engine metadata for the SPA shell. These
      apply to every route EXCEPT `/post/:chain/:postId`, where Mesh's
      server-side OG renderer takes over with per-post values.
    -->
    <title>thatsRekt — real-time on-chain hack alerts</title>
    <meta
      name="description"
      content="On-chain hack alerts for the public good. Whitelisted security teams post structured alerts the moment they spot a live exploit — attacker addresses, victim contracts, free-form context. Read on-chain or via the Telegram channel."
    />

    <!-- Open Graph (Telegram, Discord, LinkedIn, etc. when the homepage URL is shared) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="thatsRekt" />
    <meta property="og:title" content="thatsRekt — real-time on-chain hack alerts" />
    <meta
      property="og:description"
      content="On-chain hack alerts for the public good. Whitelisted security teams post the moment they spot a live exploit."
    />
    <meta property="og:url" content="https://thatsrekt.com/" />
    <meta property="og:image" content="https://thatsrekt.com/logo.png" />
    <meta property="og:image:alt" content="thatsRekt — pixel skull and crossbones with red exclamation mark and Ethereum diamond" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="@ThatsRekt_" />
    <meta name="twitter:title" content="thatsRekt — real-time on-chain hack alerts" />
    <meta
      name="twitter:description"
      content="On-chain hack alerts for the public good."
    />
    <meta name="twitter:image" content="https://thatsrekt.com/logo.png" />

    <!--
      JSON-LD structured data — gives Google / Bing / DuckDuckGo a
      machine-readable summary for rich-result eligibility. WebSite
      schema lives on every page (no harm) but is most useful on the
      homepage for sitelinks search box. Per-post pages would benefit
      from Article schema; that's a follow-up via Mesh's SSR.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "thatsRekt",
        "alternateName": "ThatsRekt",
        "description": "On-chain hack alerts for the public good. Whitelisted security teams post structured alerts the moment they spot a live exploit.",
        "url": "https://thatsrekt.com/",
        "inLanguage": "en",
        "license": "https://opensource.org/licenses/MIT",
        "sameAs": [
          "https://github.com/ThatsRekt/thatsRekt",
          "https://x.com/ThatsRekt_",
          "https://t.me/thatsrekt_alerts"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
