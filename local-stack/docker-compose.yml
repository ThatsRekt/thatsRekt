# =============================================================================
# thatsRekt — local validation stack (Base Sepolia only).
# =============================================================================
# Self-contained docker-compose stack for validating the full thatsRekt flow
# (post -> index -> mesh -> frontend) on the operator's laptop, pointed at
# Base Sepolia. Mirrors the prod stack shape from
# `damm-cloud/thatsrekt/public/docker-compose.yml`, scoped to one chain and
# stripped of prod-only concerns:
#
#   * No autoheal sidecar (manual `docker compose restart` is fine here).
#   * No certbot / TLS (HTTP only on localhost).
#   * No AWS Secrets Manager pull (env vars come straight from .env).
#   * No Base mainnet (`processor-base` / `graphql-base` not provisioned).
#
# Images come from the same prod ECR repos that ship the production EC2 host,
# so this stack always reflects whatever was last deployed. Run
# `aws ecr get-login-password ... | docker login ...` once before
# `docker compose up` (see README.md).
#
# Ports exposed on the host:
#   5433 -> postgres                (5433 to avoid colliding with prod tunnels at 5432)
#   4357 -> graphql-base-sepolia    (per-chain squid GraphQL, exposed for direct queries)
#   4350 -> mesh                    (cross-chain stitching gateway)
#   5173 -> frontend (nginx)        (SPA + /graphql reverse proxy to mesh)
# =============================================================================

x-indexer: &indexer
  image: ${ECR_REGISTRY:-465910372065.dkr.ecr.us-west-2.amazonaws.com}/thatsrekt/indexer:${IMAGE_TAG:-latest}
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  # --- shared postgres ------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Loopback only — local stack should never expose Postgres beyond the
      # host. 5433 deliberately differs from the default 5432 so it doesn't
      # collide with `damm-tunnel` / a local Postgres / prod tunnels that
      # already use 5432.
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-create-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # --- base-sepolia (chainId 84532) -----------------------------------------
  migrate-base-sepolia:
    <<: *indexer
    command: ["npx", "squid-typeorm-migration", "apply"]
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: thatsrekt_base_sepolia
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASS: ${POSTGRES_PASSWORD}
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  processor-base-sepolia:
    <<: *indexer
    command: ["node", "lib/main.js"]
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: thatsrekt_base_sepolia
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASS: ${POSTGRES_PASSWORD}
      CHAIN: base-sepolia
      # Subsquid archive gateway (free, public). Default points at the
      # base-sepolia archive — override in .env if upstream URL changes.
      ARCHIVE_BASE_SEPOLIA: ${ARCHIVE_BASE_SEPOLIA:-https://v2.archive.subsquid.io/network/base-sepolia}
      # Public Sepolia RPC. No API key needed for low-volume local indexing.
      RPC_BASE_SEPOLIA_HTTP: ${RPC_BASE_SEPOLIA}
      # Operator pastes these from the most recent Sepolia deploy
      # (proxy address + the block where it was deployed).
      CONTRACT_BASE_SEPOLIA: ${CONTRACT_BASE_SEPOLIA}
      START_BLOCK_BASE_SEPOLIA: ${START_BLOCK_BASE_SEPOLIA}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate-base-sepolia:
        condition: service_completed_successfully

  graphql-base-sepolia:
    <<: *indexer
    command: ["npx", "squid-graphql-server"]
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: thatsrekt_base_sepolia
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASS: ${POSTGRES_PASSWORD}
      GQL_PORT: 4357
      NODE_ENV: development
    ports:
      # Exposed on the host so the operator can query the per-chain squid
      # GraphQL directly (handy for debugging when mesh seems off).
      - "127.0.0.1:4357:4357"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate-base-sepolia:
        condition: service_completed_successfully

  # --- mesh: stitching gateway ----------------------------------------------
  # Configured for base-sepolia ONLY in the local stack. The mesh image reads
  # MESH_CHAINS to decide which per-chain GraphQL URLs to stitch — anything
  # not in the list is ignored even if its env var is set.
  mesh:
    image: ${ECR_REGISTRY:-465910372065.dkr.ecr.us-west-2.amazonaws.com}/thatsrekt/mesh:${IMAGE_TAG:-latest}
    environment:
      PORT: 4350
      MESH_CHAINS: ${MESH_CHAINS:-base-sepolia}
      GRAPHQL_BASE_SEPOLIA_URL: http://graphql-base-sepolia:4357/graphql
    ports:
      - "127.0.0.1:4350:4350"
    restart: unless-stopped
    depends_on:
      graphql-base-sepolia:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # --- frontend: nginx serving SPA bundle + reverse-proxying /graphql -------
  # Same image prod uses (the static SPA bundle is baked in at build time
  # with VITE_GRAPHQL_ENDPOINT=/graphql). We override the default nginx
  # config with `nginx.conf` to add a /graphql -> mesh:4350 reverse proxy
  # so the bundle's relative-path fetches resolve. No TLS / no certbot —
  # the local stack is HTTP only.
  frontend:
    image: ${ECR_REGISTRY:-465910372065.dkr.ecr.us-west-2.amazonaws.com}/thatsrekt/frontend:${IMAGE_TAG:-latest}
    ports:
      - "127.0.0.1:5173:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      mesh:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  pgdata:
