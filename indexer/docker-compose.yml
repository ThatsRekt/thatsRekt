# =============================================================================
# thatsRekt indexer — multi-squid compose stack (Phases 2 + 5).
# =============================================================================
# One Postgres process hosting one logical database per chain (provisioned
# by init.sql). One processor and one GraphQL service per chain, all built
# from the same image. Squid GraphQL ports are compose-internal only — the
# Mesh gateway is the single public surface.
#
# Chains:
#   anvil-eth  (chainId 31337)  — local Anvil fork of Sepolia
#   anvil-base     (chainId 31338)  — local Anvil fork of Base
#   sepolia        (chainId 11155111) — real Ethereum Sepolia
#   base           (chainId 8453)   — real Base mainnet
#   optimism       (chainId 10)    — real Optimism mainnet
#
# Service map per chain:
#   migrate-{slug}     one-shot migrations against thatsrekt_{slug}
#   processor-{slug}   long-running indexer
#   graphql-{slug}     squid GraphQL on internal port (4351-4355)
#
# Plus shared:
#   db                 postgres :5432  (host loopback only, 127.0.0.1)
#   mesh               GraphQL stitching gateway :4350 (the public surface)
#
# The two anvil-* chains depend on services in docker-compose.anvil.yml
# (the anvil overlay) for their RPC endpoints. Bring them up via:
#   docker compose -f docker-compose.yml -f docker-compose.anvil.yml up -d
# =============================================================================

x-indexer: &indexer
  build:
    context: .
    dockerfile: Dockerfile

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
    ports:
      - '127.0.0.1:${DB_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-create-databases.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 10

  # ===========================================================================
  # anvil-eth (chainId 31337)
  # ===========================================================================
  migrate-anvil-eth:
    <<: *indexer
    command: ['npx', 'squid-typeorm-migration', 'apply']
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: thatsrekt_anvil_eth
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
    restart: 'no'
    depends_on:
      db:
        condition: service_healthy

  processor-anvil-eth:
    <<: *indexer
    command: ['node', 'lib/main.js']
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: thatsrekt_anvil_eth
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      CHAIN: anvil-eth
      RPC_ANVIL_ETH_HTTP: ${RPC_ANVIL_ETH_HTTP:-http://anvil-eth:8545}
      CONTRACT_ANVIL_ETH: ${CONTRACT_ANVIL_ETH:-}
      START_BLOCK_ANVIL_ETH: ${START_BLOCK_ANVIL_ETH:-}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate-anvil-eth:
        condition: service_completed_successfully

  graphql-anvil-eth:
    <<: *indexer
    command: ['npx', 'squid-graphql-server']
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: thatsrekt_anvil_eth
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      GQL_PORT: 4351
      NODE_ENV: development
    expose:
      - '4351'
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate-anvil-eth:
        condition: service_completed_successfully

  # ===========================================================================
  # anvil-base (chainId 31338)
  # ===========================================================================
  migrate-anvil-base:
    <<: *indexer
    command: ['npx', 'squid-typeorm-migration', 'apply']
