[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.25"
optimizer = true
optimizer_runs = 200
# v1.1: post() now takes title + attackers + victims + note + attackedAt.
# The emit at the bottom hits stack-too-deep without via-ir, which rewrites
# through the IR pass and handles deep locals cleanly. Slight compile-time
# cost, no runtime impact.
via_ir = true
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
]

[invariant]
runs = 256
depth = 32
fail_on_revert = false

[rpc_endpoints]
mainnet      = "${MAINNET_RPC_URL}"
sepolia      = "${SEPOLIA_RPC_URL}"
base         = "${BASE_RPC_URL}"
arbitrum_one = "${ARBITRUM_RPC_URL}"
optimism     = "${OPTIMISM_RPC_URL}"

# Etherscan v2 multichain API: a single ETHERSCAN_API_KEY works across all
# supported chains. The `chain` field tells forge which chainId to send to
# the v2 endpoint; the URL is the universal v2 host.
[etherscan]
mainnet      = { key = "${ETHERSCAN_API_KEY}", chain = 1 }
sepolia      = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.etherscan.io/api" }
base         = { key = "${ETHERSCAN_API_KEY}", chain = 8453 }
arbitrum_one = { key = "${ETHERSCAN_API_KEY}", chain = 42161 }
optimism     = { key = "${ETHERSCAN_API_KEY}", chain = 10 }
