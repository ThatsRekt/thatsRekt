# =============================================================================
# thatsRekt local stack — frontend nginx config.
# =============================================================================
# Mounted into the same prod-built `frontend` image at
# /etc/nginx/conf.d/default.conf. Keeps the bits of the prod config
# required to serve the SPA bundle and reverse-proxy /graphql to mesh,
# strips the bits that don't apply locally:
#
#   * No :443 / TLS — local stack is HTTP only on 5173 (mapped from :80).
#   * No certbot / ACME challenge.
#   * No rate limiting (it's your own laptop).
#   * No OG crawler routing (no social previews against localhost).
#
# The SPA bundle was built with VITE_GRAPHQL_ENDPOINT=/graphql (relative),
# so the same image works here as long as we proxy /graphql to mesh.
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # SPA bundle — Vite-built static assets baked into the prod image.
    # BrowserRouter (pathname-based routes) means deep links need the
    # `try_files $uri /index.html` SPA fallback.
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Long-cache hashed asset files — Vite emits content-hashed filenames.
    location ~* ^/assets/.*\.(js|css|svg|png|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # GraphQL — reverse-proxy to the mesh stitching gateway (compose-internal
    # port 4350). The SPA bundle's relative `/graphql` fetches land here.
    location = /graphql {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*"                                                always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS"                              always;
            add_header Access-Control-Allow-Headers "Content-Type, Accept, X-Requested-With, Authorization" always;
            add_header Access-Control-Max-Age       "600"                                              always;
            add_header Content-Length               "0"                                                always;
            add_header Content-Type                 "text/plain"                                       always;
            return 204;
        }

        proxy_pass http://mesh:4350/graphql;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 64k;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;

        # Mesh sets its own CORS headers — strip them and serve our own
        # consistent set so we don't end up with duplicate ACAO headers
        # (which browsers reject).
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;

        add_header Access-Control-Allow-Origin  "*"                                                always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS"                              always;
        add_header Access-Control-Allow-Headers "Content-Type, Accept, X-Requested-With, Authorization" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range"                  always;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
