  # ===========================================================================
  # Mesh gateway — single public GraphQL surface stitching all 5 squid APIs.
  # ===========================================================================
  mesh:
    build:
      context: ../mesh
      dockerfile: Dockerfile
    environment:
      PORT: ${MESH_PORT:-4350}
      MESH_CHAINS: ${MESH_CHAINS:-anvil-eth,anvil-base,sepolia,base,optimism}
      GRAPHQL_ANVIL_ETH_URL: http://graphql-anvil-eth:4351/graphql
      GRAPHQL_ANVIL_BASE_URL: http://graphql-anvil-base:4354/graphql
      GRAPHQL_SEPOLIA_URL: http://graphql-sepolia:4352/graphql
      GRAPHQL_BASE_URL: http://graphql-base:4353/graphql
      GRAPHQL_OPTIMISM_URL: http://graphql-optimism:4355/graphql
    ports:
      - '127.0.0.1:${MESH_PORT:-4350}:${MESH_PORT:-4350}'
    restart: unless-stopped
    depends_on:
      graphql-anvil-eth:
        condition: service_started
      graphql-anvil-base:
        condition: service_started
      graphql-sepolia:
        condition: service_started
      graphql-base:
        condition: service_started
      graphql-optimism:
        condition: service_started

volumes:
  pgdata:
