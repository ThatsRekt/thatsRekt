x-indexer: &indexer
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    DB_HOST: db
    DB_PORT: 5432
    DB_NAME: ${DB_NAME:-squid}
    DB_USER: ${DB_USER:-postgres}
    DB_PASS: ${DB_PASS:-postgres}
  depends_on:
    db:
      condition: service_healthy

# All per-chain env vars are passed through. The processor only consumes the
# block matching CHAIN (e.g. CHAIN=base → RPC_BASE_HTTP / CONTRACT_BASE /
# START_BLOCK_BASE). Other blocks can be unset; the processor reads what it
# needs and ignores the rest.
x-chain-env: &chain-env
  CHAIN: ${CHAIN:-base}
  RPC_BASE_HTTP: ${RPC_BASE_HTTP:-}
  CONTRACT_BASE: ${CONTRACT_BASE:-}
  START_BLOCK_BASE: ${START_BLOCK_BASE:-}
  RPC_SEPOLIA_HTTP: ${RPC_SEPOLIA_HTTP:-}
  CONTRACT_SEPOLIA: ${CONTRACT_SEPOLIA:-}
  START_BLOCK_SEPOLIA: ${START_BLOCK_SEPOLIA:-}
  RPC_ANVIL_HTTP: ${RPC_ANVIL_HTTP:-}
  CONTRACT_ANVIL: ${CONTRACT_ANVIL:-}
  START_BLOCK_ANVIL: ${START_BLOCK_ANVIL:-}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-squid}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies committed migrations against the freshly-started db.
  # Has to complete successfully before processor + api come up.
  migrate:
    <<: *indexer
    command: ['npx', 'squid-typeorm-migration', 'apply']
    restart: 'no'

  # Indexes blocks. Restarts on failure (RPC blips, reorgs handled by Subsquid).
  # Phase 2 will fan this out to one service per chain (processor-anvil,
  # processor-sepolia, processor-base) — Phase 1 keeps a single instance
  # selected by the CHAIN env var.
  processor:
    <<: *indexer
    command: ['node', 'lib/main.js']
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-squid}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      <<: *chain-env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # GraphQL server. Reads schema.graphql + DB; serves on GQL_PORT (default 4350).
  api:
    <<: *indexer
    command: ['npx', 'squid-graphql-server']
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-squid}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      GQL_PORT: ${GQL_PORT:-4350}
    ports:
      - '${GQL_PORT:-4350}:${GQL_PORT:-4350}'
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
